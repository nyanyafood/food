<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Kasir Bluetooth</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- ICON ---
    const Icon = ({ children, size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
    const ShoppingCart = (p) => <Icon {...p}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></Icon>;
    const Printer = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></Icon>;
    const Plus = (p) => <Icon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
    const Minus = (p) => <Icon {...p}><path d="M5 12h14"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
    const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
    const Coffee = (p) => <Icon {...p}><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></Icon>;
    const Utensils = (p) => <Icon {...p}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></Icon>;
    const PackageIcon = (p) => <Icon {...p}><line x1="16.5" x2="7.5" y1="9.4" y2="4.2"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></Icon>;
    const LayoutDashboard = (p) => <Icon {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></Icon>;
    const ClipboardList = (p) => <Icon {...p}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></Icon>;
    const PackageSearch = (p) => <Icon {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"/><path d="M16.5 9.4 7.55 4.24"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" x2="12" y1="22" y2="12"/><circle cx="18.5" cy="15.5" r="2.5"/><path d="M20.27 17.27 22 19"/></Icon>;
    const Edit2 = (p) => <Icon {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Icon>;
    const X = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
    const Save = (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>;
    const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const Store = (p) => <Icon {...p}><path d="M20.92 8.96 19.33 3.4A2 2 0 0 0 17.41 2H6.59a2 2 0 0 0-1.92 1.4L3.08 8.96A2 2 0 0 0 3 10v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2a2 2 0 0 0-.08-1.04z"/><path d="M5 14v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/><path d="M12 14v8"/></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></Icon>;
    const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
    const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></Icon>;
    const Image = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Icon>;
    const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></Icon>;
    const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Icon>;
    const Database = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></Icon>;
    const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></Icon>;
    const ScanBarcode = (p) => <Icon {...p}><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 8v8"/><path d="M12 8v8"/><path d="M17 8v8"/></Icon>;
    const QrCode = (p) => <Icon {...p}><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="15" y="3" width="6" height="6" rx="1"/><rect x="3" y="15" width="6" height="6" rx="1"/><path d="M15 15h2v2h-2z"/><path d="M19 15h2v2h-2z"/><path d="M15 19h2v2h-2z"/><path d="M19 19h2v2h-2z"/></Icon>;
    const User = (p) => <Icon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;

    const INITIAL_PRODUCTS = [
      { id: 1, name: 'Kopi Susu Gula Aren', price: 18000, category: 'Minuman', stock: 50, barcode: '1111' },
      { id: 2, name: 'Americano', price: 15000, category: 'Minuman', stock: 50, barcode: '2222' },
      { id: 3, name: 'Matcha Latte', price: 22000, category: 'Minuman', stock: 40, barcode: '3333' },
      { id: 4, name: 'Nasi Goreng Spesial', price: 25000, category: 'Makanan', stock: 30, barcode: '4444' },
      { id: 5, name: 'Mie Goreng Telur', price: 15000, category: 'Makanan', stock: 35, barcode: '5555' },
      { id: 6, name: 'Kentang Goreng', price: 12000, category: 'Cemilan', stock: 100, barcode: '6666' },
      { id: 7, name: 'Roti Bakar Coklat', price: 15000, category: 'Cemilan', stock: 25, barcode: '7777' },
      { id: 8, name: 'Es Teh Manis', price: 5000, category: 'Minuman', stock: 100, barcode: '8888' },
    ];

    function App() {
      const [cart, setCart] = useState([]);
      const [printerDevice, setPrinterDevice] = useState(null);
      const [printerCharacteristic, setPrinterCharacteristic] = useState(null);
      const [isConnecting, setIsConnecting] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [isSupported, setIsSupported] = useState(true);

      const [activeTab, setActiveTab] = useState('kasir');
      
      const [products, setProducts] = useState(() => { const saved = localStorage.getItem('pos_products'); return saved ? JSON.parse(saved) : INITIAL_PRODUCTS; });
      const [salesHistory, setSalesHistory] = useState(() => { const saved = localStorage.getItem('pos_sales'); return saved ? JSON.parse(saved) : []; });
      const [storeInfo, setStoreInfo] = useState(() => { 
        const saved = localStorage.getItem('pos_store_info'); 
        const parsed = saved ? JSON.parse(saved) : {};
        return { 
          name: parsed.name || 'POS Kasir Mini', 
          address: parsed.address || 'Jl. GitHub Pages No. 1', 
          logo: parsed.logo || '',
          cashierName: parsed.cashierName || 'Kasir Utama',
          qrisImage: parsed.qrisImage || '',
          bankInfo: parsed.bankInfo || ''
        }; 
      });
      const [categories, setCategories] = useState(() => { const saved = localStorage.getItem('pos_categories'); return saved ? JSON.parse(saved) : ['Minuman', 'Makanan', 'Cemilan', 'Lainnya']; });
      
      const [newCategory, setNewCategory] = useState('');
      const [editingCategory, setEditingCategory] = useState(null);
      const [editCategoryInput, setEditCategoryInput] = useState('');
      
      const [editingId, setEditingId] = useState(null);
      const [formData, setFormData] = useState({ name: '', price: '', category: categories[0] || 'Lainnya', stock: '', barcode: '' });
      const [currentReceipt, setCurrentReceipt] = useState(null);
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [cashAmount, setCashAmount] = useState('');
      const [paymentMethod, setPaymentMethod] = useState('Tunai'); // 'Tunai' | 'Online'

      const [searchTerm, setSearchTerm] = useState('');
      const barcodeBuffer = useRef('');
      const barcodeTimeout = useRef(null);

      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [pinCode, setPinCode] = useState(() => localStorage.getItem('pos_pin') || '1234');
      const [loginInput, setLoginInput] = useState('');
      const [loginError, setLoginError] = useState('');

      const [oldPinInput, setOldPinInput] = useState('');
      const [newPinInput, setNewPinInput] = useState('');
      const [confirmPinInput, setConfirmPinInput] = useState('');
      const [pinMessage, setPinMessage] = useState({ type: '', text: '' });

      const fileInputRef = useRef(null);
      const importFileRef = useRef(null); 
      const qrisInputRef = useRef(null);

      // --- EFEK SIMPAN OTOMATIS ---
      useEffect(() => { localStorage.setItem('pos_products', JSON.stringify(products)); }, [products]);
      useEffect(() => { localStorage.setItem('pos_sales', JSON.stringify(salesHistory)); }, [salesHistory]);
      useEffect(() => { localStorage.setItem('pos_store_info', JSON.stringify(storeInfo)); }, [storeInfo]);
      useEffect(() => { localStorage.setItem('pos_pin', pinCode); }, [pinCode]);
      useEffect(() => { localStorage.setItem('pos_categories', JSON.stringify(categories)); }, [categories]);

      // --- LISTENER SCANNER BARCODE ---
      useEffect(() => {
        if (activeTab !== 'kasir') return;
        
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          
          if (e.key === 'Enter') {
            if (barcodeBuffer.current) {
              const code = barcodeBuffer.current;
              barcodeBuffer.current = '';
              const product = products.find(p => p.barcode === code);
              if (product) addToCart(product);
              else alert('Barcode ' + code + ' tidak ditemukan di database produk!');
            }
          } else if (e.key.length === 1) {
            barcodeBuffer.current += e.key;
            clearTimeout(barcodeTimeout.current);
            barcodeTimeout.current = setTimeout(() => { barcodeBuffer.current = ''; }, 300);
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [activeTab, products]);

      const handleBackupData = () => {
        const backupData = {
          products, salesHistory, storeInfo, categories, pinCode,
          exportDate: new Date().toISOString()
        };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `Backup_Kasir_${new Date().getTime()}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
      };

      const handleRestoreData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (importedData.products && importedData.salesHistory && importedData.storeInfo) {
              setProducts(importedData.products);
              setSalesHistory(importedData.salesHistory);
              setStoreInfo({
                ...importedData.storeInfo,
                qrisImage: importedData.storeInfo.qrisImage || '',
                bankInfo: importedData.storeInfo.bankInfo || ''
              });
              if (importedData.categories) setCategories(importedData.categories);
              if (importedData.pinCode) setPinCode(importedData.pinCode);
              alert("Data berhasil dikembalikan (Restore)! Aplikasi siap digunakan.");
            } else {
              alert("Format file tidak valid atau rusak!");
            }
          } catch (error) {
            alert("Gagal membaca file backup!");
            console.error(error);
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const getCategoryIcon = (category) => {
        switch(category?.toLowerCase()) {
          case 'minuman': return <Coffee size={24} />;
          case 'makanan': return <Utensils size={24} />;
          default: return <PackageIcon size={24} />;
        }
      };

      const handleProductSubmit = (e) => {
        e.preventDefault();
        if (!formData.name || !formData.price || formData.stock === '') return;

        if (editingId) {
          setProducts(products.map(p => p.id === editingId ? { ...p, ...formData, price: Number(formData.price), stock: Number(formData.stock) } : p));
          setEditingId(null);
        } else {
          setProducts([...products, { id: Date.now(), ...formData, price: Number(formData.price), stock: Number(formData.stock) }]);
        }
        setFormData({ name: '', price: '', category: categories[0] || 'Lainnya', stock: '', barcode: '' });
      };

      const handleEditProduct = (product) => {
        setEditingId(product.id);
        setFormData({ name: product.name, price: product.price, category: product.category, stock: product.stock !== undefined ? product.stock : 0, barcode: product.barcode || '' });
        setActiveTab('produk');
      };

      const handleDeleteProduct = (id) => {
        if (window.confirm('Yakin ingin menghapus produk ini?')) {
          setProducts(products.filter(p => p.id !== id));
          removeFromCart(id);
        }
      };

      useEffect(() => {
        if (!navigator.bluetooth) {
          setIsSupported(false);
          setErrorMsg('Browser ini tidak mendukung Web Bluetooth. Gunakan Chrome atau Edge (Android/PC). iOS tidak didukung.');
        }
      }, []);

      const formatRupiah = (angka) => {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
      };

      const addToCart = (product) => {
        const currentStock = product.stock !== undefined ? product.stock : 0;
        if (currentStock <= 0) return alert('Stok produk habis!');
        
        setCart((prevCart) => {
          const existingItem = prevCart.find((item) => item.product.id === product.id);
          if (existingItem) {
            if (existingItem.quantity >= currentStock) {
              alert('Maksimal stok tercapai!');
              return prevCart;
            }
            return prevCart.map((item) => item.product.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
          }
          return [...prevCart, { product, quantity: 1 }];
        });
      };

      const updateQuantity = (productId, delta) => {
        setCart((prevCart) => prevCart.map((item) => {
            if (item.product.id === productId) {
              const currentStock = item.product.stock !== undefined ? item.product.stock : 0;
              const newQuantity = item.quantity + delta;
              if (newQuantity > currentStock) {
                alert('Maksimal stok tercapai!');
                return item;
              }
              return newQuantity > 0 ? { ...item, quantity: newQuantity } : item;
            }
            return item;
          }).filter(item => item.quantity > 0)
        );
      };

      const removeFromCart = (productId) => {
        setCart((prevCart) => prevCart.filter((item) => item.product.id !== productId));
      };

      const total = useMemo(() => cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0), [cart]);
      const changeAmount = Number(cashAmount) - total;

      const connectToPrinter = async () => {
        setIsConnecting(true);
        setErrorMsg('');
        try {
          const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: [
              '000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2', '49535343-fe7d-4ae5-8fa9-9fafd205e455'
            ]
          });
          const server = await device.gatt.connect();
          const services = await server.getPrimaryServices();
          if (services.length === 0) throw new Error('Tidak ada layanan Bluetooth.');

          let writeCharacteristic = null;
          for (const service of services) {
            const characteristics = await service.getCharacteristics();
            for (const characteristic of characteristics) {
              if (characteristic.properties.write || characteristic.properties.writeWithoutResponse) {
                writeCharacteristic = characteristic; break;
              }
            }
            if (writeCharacteristic) break;
          }

          if (!writeCharacteristic) throw new Error('Printer tidak bisa menerima data.');

          setPrinterDevice(device);
          setPrinterCharacteristic(writeCharacteristic);

          device.addEventListener('gattserverdisconnected', () => {
            setPrinterDevice(null);
            setPrinterCharacteristic(null);
            setErrorMsg('Printer terputus.');
          });
        } catch (err) {
          console.error(err);
          setErrorMsg(err.message || 'Gagal terhubung ke printer.');
        } finally {
          setIsConnecting(false);
        }
      };

      const sendTextToPrinter = async (characteristic, text) => {
        const encoder = new TextEncoder();
        const initCmd = new Uint8Array([0x1B, 0x40]);
        await characteristic.writeValue(initCmd);
        const data = encoder.encode(text);
        for (let i = 0; i < data.length; i += 100) {
          await characteristic.writeValue(data.slice(i, i + 100));
        }
        const feedCmd = new Uint8Array([0x0A, 0x0A, 0x0A]);
        await characteristic.writeValue(feedCmd);
      };

      const padCenter = (str, length) => {
        if (!str) return ' '.repeat(length);
        if (str.length >= length) return str.substring(0, length);
        const leftPad = Math.floor((length - str.length) / 2);
        return ' '.repeat(leftPad) + str + ' '.repeat(length - str.length - leftPad);
      };

      const printReceiptAsPDF = () => {
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const html = `
          <html><head><title>Struk_${currentReceipt.id}</title>
            <style>
              @page { margin: 0; size: 58mm auto; }
              body { font-family: 'Courier New', Courier, monospace; width: 58mm; margin: 0 auto; padding: 10px; color: #000; font-size: 12px; }
              .text-center { text-align: center; } .text-right { text-align: right; } .font-bold { font-weight: bold; }
              .divider { border-top: 1px dashed #000; margin: 8px 0; }
              table { width: 100%; border-collapse: collapse; } td { padding: 2px 0; vertical-align: top; }
              .receipt-logo { max-width: 40mm; max-height: 20mm; margin: 0 auto 10px auto; display: block; object-fit: contain; }
            </style>
          </head><body>
            ${storeInfo.logo ? `<img src="${storeInfo.logo}" class="receipt-logo" />` : ''}
            <div class="text-center font-bold" style="font-size:14px; margin-bottom:4px;">${storeInfo.name}</div>
            <div class="text-center" style="font-size:10px; margin-bottom:15px;">${storeInfo.address}</div>
            <div style="font-size: 10px; margin-bottom: 2px;">Kasir: ${currentReceipt.cashier || storeInfo.cashierName}</div>
            <div style="font-size: 10px; margin-bottom: 8px;">Tanggal: ${currentReceipt.date}</div>
            <div class="divider"></div>
            <table>
              ${currentReceipt.items.map(item => `
                <tr><td colspan="2" class="font-bold">${item.product.name}</td></tr>

                <tr><td class="font-bold" style="font-size:12px;">KEMBALI</td><td class="text-right font-bold" style="font-size:12px;">${formatRupiah(currentReceipt.change || 0)}</td></tr>

            <div class="text-center" style="font-size: 10px; margin-top: 2px;">Silakan datang kembali :)</div>
          </body></html>
        `;

        iframe.contentWindow.document.open();
        iframe.contentWindow.document.write(html);
        iframe.contentWindow.document.close();

        setTimeout(() => {
          try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch (e) { window.print(); }
          setTimeout(() => { if (document.body.contains(iframe)) document.body.removeChild(iframe); }, 1000);
        }, 500);
      };

      const printSalesSummaryAsPDF = () => {
        if (salesHistory.length === 0) return alert('Tidak ada data rekap untuk dicetak.');
        
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const grandTotal = salesHistory.reduce((sum, sale) => sum + sale.total, 0);
        const printDate = new Date().toLocaleString('id-ID');

        const html = `
          <html><head><title>Rekap_Penjualan_${storeInfo.name}</title>
            <style>
              @page { margin: 20mm; size: A4 portrait; }
              body { font-family: sans-serif; color: #333; font-size: 14px; line-height: 1.5; }
              .text-center { text-align: center; } .text-right { text-align: right; } .font-bold { font-weight: bold; }
              table { width: 100%; border-collapse: collapse; margin-top: 20px; }
              th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: top; }

          </head><body>

                ${storeInfo.logo ? `<img src="${storeInfo.logo}" class="summary-logo" />` : ''}
                ${storeInfo.name}
              </h1>
              <p class="text-center" style="margin:0; color:#555;">${storeInfo.address}</p>
              <h2 class="text-center" style="margin:15px 0 5px 0; font-size: 18px;">Laporan Rekap Penjualan</h2>
              <p class="text-center" style="margin:0; font-size:12px; color:#777;">Dicetak pada: ${printDate}</p>
            </div>
            <table>
              <thead>
                <tr>
                  <th style="width: 5%;">No</th>
                  <th style="width: 25%;">Waktu Transaksi</th>
                  <th style="width: 45%;">Rincian Item</th>
                  <th class="text-right" style="width: 25%;">Total</th>
                </tr>
              </thead>
              <tbody>
                ${salesHistory.map((sale, index) => `
                  <tr>
                    <td>${index + 1}</td>
                    <td>${sale.date}</td>
                    <td class="item-list">
                      ${sale.items.map(item => `${item.quantity}x ${item.product.name}`).join('<br>')}
                    </td>
                    <td class="text-right font-bold">${formatRupiah(sale.total)}</td>
                  </tr>
                `).join('')}
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="3" class="text-right font-bold" style="font-size: 16px;">TOTAL PENDAPATAN</td>
                  <td class="text-right font-bold" style="font-size: 16px; color: #16a34a;">${formatRupiah(grandTotal)}</td>
                </tr>
              </tfoot>
            </table>
          </body></html>
        `;

        iframe.contentWindow.document.open();
        iframe.contentWindow.document.write(html);
        iframe.contentWindow.document.close();

        setTimeout(() => {
          try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch (e) { window.print(); }
          setTimeout(() => { if (document.body.contains(iframe)) document.body.removeChild(iframe); }, 1000);
        }, 500);
      };

      const printBluetooth = async (saleData) => {
        if (!printerCharacteristic) return alert('Printer Bluetooth belum terhubung!');
        try {
          let receiptText = "";
          receiptText += padCenter(storeInfo.name, 32) + "\n";
          receiptText += padCenter(storeInfo.address, 32) + "\n";
          receiptText += "================================\n";
          receiptText += `KASIR  : ${saleData.cashier || storeInfo.cashierName}\n`;
          receiptText += `TANGGAL: ${saleData.date}\n`;
          receiptText += "================================\n";
          
          saleData.items.forEach(item => {
            receiptText += `${item.product.name}\n`;
            const qtyPrice = `${item.quantity} x ${item.product.price}`;
            const subtotal = `${item.quantity * item.product.price}`;
            const spaces = Math.max(1, 32 - qtyPrice.length - subtotal.length);
            receiptText += `${qtyPrice}${' '.repeat(spaces)}${subtotal}\n`;
          });
          
          receiptText += "================================\n";
          const totalStr = `${saleData.total}`;
          const totalLabel = "TOTAL:";
          const totalSpaces = 32 - totalLabel.length - totalStr.length;
          receiptText += `${totalLabel}${totalSpaces > 0 ? ' '.repeat(totalSpaces) : ' '}${totalStr}\n`;
          
          const methodStr = `${saleData.paymentMethod || 'Tunai'}`.toUpperCase();
          const methodLabel = "METODE:";
          const methodSpaces = 32 - methodLabel.length - methodStr.length;
          receiptText += `${methodLabel}${methodSpaces > 0 ? ' '.repeat(methodSpaces) : ' '}${methodStr}\n`;

          if (saleData.paymentMethod !== 'Online') {
            const cashStr = `${saleData.cash || 0}`;
            const cashLabel = "TUNAI:";
            const cashSpaces = 32 - cashLabel.length - cashStr.length;
            receiptText += `${cashLabel}${cashSpaces > 0 ? ' '.repeat(cashSpaces) : ' '}${cashStr}\n`;

            const changeStr = `${saleData.change || 0}`;
            const changeLabel = "KEMBALI:";
            const changeSpaces = 32 - changeLabel.length - changeStr.length;
            receiptText += `${changeLabel}${changeSpaces > 0 ? ' '.repeat(changeSpaces) : ' '}${changeStr}\n`;
          }
          
          receiptText += "================================\n";
          receiptText += "          Terima Kasih         \n   Silakan datang kembali :)   \n\n\n";

          await sendTextToPrinter(printerCharacteristic, receiptText);
          alert('Struk berhasil dicetak via Bluetooth!');
        } catch (err) {
          alert('Gagal mencetak struk via Bluetooth: ' + err.message);
        }
      };

      const handlePayment = () => {
        if (cart.length === 0) return alert('Keranjang kosong!');
        setCashAmount('');
        setPaymentMethod('Tunai');
        setShowPaymentModal(true);
      };

      const processPayment = () => {
        if (paymentMethod === 'Tunai' && changeAmount < 0) return alert('Uang tunai kurang!');
        
        const finalCash = paymentMethod === 'Online' ? total : Number(cashAmount);
        const finalChange = paymentMethod === 'Online' ? 0 : changeAmount;

        const newSale = { 
          id: Date.now(), 
          date: new Date().toLocaleString('id-ID'), 
          items: [...cart], 
          total, 
          cash: finalCash, 
          change: finalChange,
          paymentMethod,
          cashier: storeInfo.cashierName || 'Kasir'
        };
        
        setProducts(prevProducts => prevProducts.map(p => {
          const cartItem = cart.find(c => c.product.id === p.id);
          if (cartItem) {
            const currentStock = p.stock !== undefined ? p.stock : 0;
            return { ...p, stock: Math.max(0, currentStock - cartItem.quantity) };
          }
          return p;
        }));

        setSalesHistory(prev => [newSale, ...prev]);
        setCart([]); 
        setShowPaymentModal(false);
        setCurrentReceipt(newSale);
      };

      const handleLogin = (e) => {
        e.preventDefault();
        if (loginInput === pinCode) {
          setIsAuthenticated(true);
          setLoginError('');
          setLoginInput('');
        } else {
          setLoginError('PIN salah! Silakan coba lagi.');
        }
      };

      const handleLogout = () => {
        if (window.confirm('Yakin ingin keluar dari sistem kasir?')) {
          setIsAuthenticated(false);
          setActiveTab('kasir');
        }
      };

      const handleChangePin = (e) => {
        e.preventDefault();
        if (oldPinInput !== pinCode) {
          setPinMessage({ type: 'error', text: 'PIN Lama salah!' });
          return;
        }
        if (newPinInput !== confirmPinInput) {
          setPinMessage({ type: 'error', text: 'Konfirmasi PIN Baru tidak cocok!' });
          return;
        }
        if (newPinInput.length < 4) {
          setPinMessage({ type: 'error', text: 'PIN Baru harus minimal 4 karakter!' });
          return;
        }
        setPinCode(newPinInput);
        setPinMessage({ type: 'success', text: 'PIN berhasil diubah!' });
        setOldPinInput('');
        setNewPinInput('');
        setConfirmPinInput('');
        setTimeout(() => setPinMessage({ type: '', text: '' }), 3000);
      };

      const handleAddCategory = () => {
        if (!newCategory.trim()) return;
        if (categories.includes(newCategory.trim())) return alert('Kategori sudah ada!');
        setCategories([...categories, newCategory.trim()]);
        setNewCategory('');
      };

      const handleDeleteCategory = (cat) => {
        if (categories.length <= 1) return alert('Minimal harus ada 1 kategori!');
        if (window.confirm(`Yakin ingin menghapus kategori "${cat}"?`)) {
          const newCategories = categories.filter(c => c !== cat);
          setCategories(newCategories);
          if (formData.category === cat) setFormData({ ...formData, category: newCategories[0] });
        }
      };

      const handleEditCategorySave = (oldCat) => {
        const trimmedNewCat = editCategoryInput.trim();
        if (!trimmedNewCat) { setEditingCategory(null); return; }
        if (trimmedNewCat !== oldCat && categories.includes(trimmedNewCat)) return alert('Kategori sudah ada!');
        const newCategories = categories.map(c => c === oldCat ? trimmedNewCat : c);
        setCategories(newCategories);
        setProducts(prev => prev.map(p => p.category === oldCat ? { ...p, category: trimmedNewCat } : p));
        if (formData.category === oldCat) setFormData({ ...formData, category: trimmedNewCat });
        setEditingCategory(null);
      };

      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) return alert('Tolong unggah file gambar saja!');
        if (file.size > 2 * 1024 * 1024) return alert('Ukuran file terlalu besar! Gunakan gambar di bawah 2MB.');

        const reader = new FileReader();
        reader.onload = (event) => setStoreInfo({ ...storeInfo, logo: event.target.result });
        reader.readAsDataURL(file);
      };

      const handleQrisUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) return alert('Tolong unggah file gambar saja!');
        if (file.size > 2 * 1024 * 1024) return alert('Ukuran file terlalu besar! Gunakan gambar di bawah 2MB.');

        const reader = new FileReader();
        reader.onload = (event) => setStoreInfo({ ...storeInfo, qrisImage: event.target.result });
        reader.readAsDataURL(file);
      };

      if (!isAuthenticated) {
        return (
          <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 font-sans text-gray-800">
            <div className="bg-white rounded-3xl shadow-xl p-10 w-full max-w-sm flex flex-col items-center border border-gray-100">
              <div className="w-24 h-24 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mb-6 overflow-hidden border border-blue-100 shadow-inner">
                {storeInfo.logo ? <img src={storeInfo.logo} alt="Logo" className="w-full h-full object-contain" /> : <Store size={48} />}
              </div>
              <h1 className="text-3xl font-extrabold text-gray-900 mb-2 text-center tracking-tight">{storeInfo.name}</h1>
              <p className="text-gray-500 mb-10 text-center text-sm font-medium leading-relaxed">Silakan masukkan PIN akses kasir untuk masuk ke sistem.</p>
              
              <form onSubmit={handleLogin} className="w-full flex flex-col gap-6">
                <div className="relative">
                  <input type="password" value={loginInput} onChange={(e) => setLoginInput(e.target.value)} placeholder="Masukkan PIN" className="w-full border-2 border-gray-200 rounded-2xl p-5 text-center text-2xl tracking-[0.75em] font-black focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all placeholder:tracking-normal placeholder:font-medium placeholder:text-base placeholder:text-gray-300" autoFocus />
                  {loginError && <p className="text-red-500 text-xs mt-3 text-center font-bold">{loginError}</p>}
                </div>
                <button type="submit" className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 active:scale-95 flex justify-center items-center gap-3 transition-all shadow-lg shadow-blue-200"><Lock size={20} /> Masuk Sekarang</button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <React.Fragment>
          <style>{`@media print { @page { margin: 0; size: 58mm auto; } body { margin: 0; padding: 10px; background: white; } }`}</style>
          
          <div className="min-h-screen bg-gray-50 flex flex-col font-sans print:hidden">
            <header className="bg-blue-600 text-white p-4 shadow-md z-10">
              <div className="max-w-7xl mx-auto flex justify-between items-center">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-white rounded-lg flex items-center justify-center overflow-hidden shrink-0">
                    {storeInfo.logo ? <img src={storeInfo.logo} className="w-full h-full object-contain p-0.5" /> : <Store size={24} className="text-blue-600" />}
                  </div>
                  <h1 className="text-xl font-bold tracking-tight truncate max-w-[150px] sm:max-w-none">{storeInfo.name}</h1>
                </div>

                <div className="flex items-center gap-4">
                  <div className="hidden md:flex items-center gap-2 bg-blue-700/50 px-3 py-1.5 rounded-lg text-sm font-bold border border-blue-500">
                    <User size={16} /> <span className="truncate max-w-[100px]">{storeInfo.cashierName || 'Kasir'}</span>
                  </div>
                  {printerDevice ? (
                    <div className="flex items-center gap-2 bg-green-500/20 text-green-100 px-3 py-1.5 rounded-full text-sm border border-green-400"><CheckCircle2 size={16} /><span>{printerDevice.name || 'Terhubung'}</span></div>

                    <button onClick={connectToPrinter} disabled={isConnecting || !isSupported} className="flex items-center gap-2 bg-white text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-lg text-sm font-semibold transition-colors disabled:opacity-50 shadow-sm hidden sm:flex"><Printer size={18} />{isConnecting ? 'Menghubungkan...' : 'Hubungkan Printer'}</button>
                  )}
                  <button onClick={handleLogout} className="flex items-center gap-2 bg-red-500/20 text-red-100 hover:bg-red-500/30 px-3 py-2 rounded-lg text-sm font-semibold transition-colors border border-red-400" title="Keluar"><LogOut size={16} className="sm:hidden" /><span className="hidden sm:inline">Keluar</span></button>
                </div>
              </div>
            </header>

            <nav className="bg-white border-b border-gray-200 px-4 flex gap-6 overflow-x-auto shadow-sm">

              <button onClick={() => setActiveTab('produk')} className={`py-4 px-2 font-bold text-sm flex items-center gap-2 border-b-4 whitespace-nowrap transition-all ${activeTab === 'produk' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}><PackageSearch size={18} /> Kelola Produk</button>
              <button onClick={() => setActiveTab('rekap')} className={`py-4 px-2 font-bold text-sm flex items-center gap-2 border-b-4 whitespace-nowrap transition-all ${activeTab === 'rekap' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}><ClipboardList size={18} /> Rekap Penjualan</button>
              <button onClick={() => setActiveTab('pengaturan')} className={`py-4 px-2 font-bold text-sm flex items-center gap-2 border-b-4 whitespace-nowrap transition-all ${activeTab === 'pengaturan' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}><Settings size={18} /> Pengaturan Toko</button>
            </nav>

            {errorMsg && <div className="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 m-4 max-w-7xl mx-auto rounded shadow-sm flex items-start gap-3 w-full animate-pulse"><AlertCircle size={20} className="mt-0.5 flex-shrink-0" /><p className="text-sm font-bold">{errorMsg}</p></div>}

            <main className="flex-1 max-w-7xl mx-auto w-full p-4 flex flex-col lg:flex-row gap-6 overflow-y-auto lg:h-[calc(100vh-140px)]">
              
              {activeTab === 'kasir' && (
                <React.Fragment>
                  <div className="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden min-h-[400px] lg:min-h-0">
                    <div className="p-5 border-b border-gray-100 bg-gray-50/50 flex flex-col gap-4">
                      <h2 className="font-bold text-gray-700 text-lg">Daftar Produk</h2>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Search size={18} className="text-gray-400" /></div>
                        <input 
                          type="text" 
                          value={searchTerm} 
                          onChange={(e) => setSearchTerm(e.target.value)}
                          onKeyDown={(e) => {
                            if (e.key === 'Enter') {
                              const product = products.find(p => p.barcode === searchTerm);
                              if (product) { addToCart(product); setSearchTerm(''); }
                            }
                          }}
                          className="w-full pl-12 pr-12 py-3 bg-white border-2 border-gray-100 rounded-xl text-sm font-bold focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all shadow-inner" 
                          placeholder="Cari nama produk atau scan barcode di sini..."
                        />
                        <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><ScanBarcode size={18} className="text-gray-400" /></div>
                      </div>
                    </div>
                    <div className="p-5 overflow-y-auto">
                      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-5">
                        {products
                          .filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()) || (p.barcode && p.barcode.includes(searchTerm)))
                          .map((product) => {
                          const stock = product.stock !== undefined ? product.stock : 0;
                          const isOutOfStock = stock <= 0;
                          return (
                            <button key={product.id} onClick={() => !isOutOfStock && addToCart(product)} disabled={isOutOfStock} className={`flex flex-col items-center p-5 border-2 rounded-2xl transition-all group text-left w-full focus:outline-none focus:ring-4 focus:ring-blue-100 relative ${isOutOfStock ? 'opacity-40 cursor-not-allowed bg-gray-100 border-gray-200' : 'hover:border-blue-500 hover:bg-blue-50/30 border-gray-100 shadow-sm'}`}>
                              <div className={`absolute top-2 right-2 text-[10px] font-black px-2 py-0.5 rounded-full border ${stock <= 5 ? 'bg-red-500 text-white border-red-600' : 'bg-green-100 text-green-700 border-green-200'}`}>Stok: {stock}</div>
                              <div className={`p-4 rounded-2xl mb-4 transition-all shadow-inner ${isOutOfStock ? 'bg-gray-200 text-gray-400' : 'bg-gray-50 text-gray-500 group-hover:bg-blue-600 group-hover:text-white group-hover:rotate-6'}`}>{getCategoryIcon(product.category)}</div>
                              <span className="font-bold text-gray-900 text-sm mb-1 text-center line-clamp-2 leading-tight">{product.name}</span>
                              <span className="text-blue-600 font-black text-sm">{formatRupiah(product.price)}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  <div className="w-full lg:w-[400px] bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col h-[500px] lg:h-full shrink-0">
                    <div className="p-5 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                      <h2 className="font-bold text-gray-700 text-lg flex items-center gap-2"><ShoppingCart size={20} className="text-blue-600" /> Keranjang</h2>
                      <span className="bg-blue-600 text-white py-1 px-3 rounded-full text-xs font-black shadow-lg shadow-blue-100">{cart.reduce((sum, item) => sum + item.quantity, 0)}</span>
                    </div>
                    <div className="flex-1 overflow-y-auto p-5 flex flex-col gap-4">
                      {cart.length === 0 ? (
                        <div className="m-auto text-center text-gray-300 flex flex-col items-center"><ShoppingCart size={64} className="mb-4 opacity-10" /><p className="font-bold text-gray-400">Keranjang Kosong</p><p className="text-xs mt-1">Pilih menu di samping</p></div>
                      ) : (
                        cart.map((item) => (
                          <div key={item.product.id} className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <div className="flex-1 pr-3"><h4 className="font-bold text-gray-800 text-sm leading-tight mb-1">{item.product.name}</h4><p className="text-gray-500 text-xs font-medium">{formatRupiah(item.product.price)}</p></div>
                            <div className="flex items-center gap-3">
                              <div className="flex items-center bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm"><button onClick={() => updateQuantity(item.product.id, -1)} className="p-2 hover:bg-red-50 hover:text-red-600 text-gray-500 transition-colors"><Minus size={14} /></button><span className="w-10 text-center text-sm font-black text-gray-700">{item.quantity}</span><button onClick={() => updateQuantity(item.product.id, 1)} className="p-2 hover:bg-blue-50 hover:text-blue-600 text-gray-500 transition-colors"><Plus size={14} /></button></div>
                              <button onClick={() => removeFromCart(item.product.id)} className="p-2 text-red-500 hover:bg-red-100 rounded-xl transition-all" title="Hapus"><Trash2 size={18} /></button>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                    <div className="p-5 bg-gray-50 border-t border-gray-100 rounded-b-2xl">
                      <div className="flex justify-between items-center mb-5"><span className="text-gray-500 font-bold">Total</span><span className="text-3xl font-black text-blue-600">{formatRupiah(total)}</span></div>
                      <button onClick={handlePayment} disabled={cart.length === 0} className={`w-full py-5 rounded-2xl font-black text-white flex justify-center items-center gap-3 shadow-lg transition-all ${cart.length === 0 ? 'bg-gray-300 shadow-none cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 shadow-blue-100 active:scale-95'}`}><FileText size={22} /> Bayar Sekarang</button>
                      {!printerDevice && cart.length > 0 && <p className="text-[10px] text-orange-500 text-center mt-4 font-bold tracking-tight"><AlertCircle size={10} className="inline mr-1 mb-0.5" /> Printer Bluetooth belum terhubung</p>}
                    </div>

                            <button onClick={() => setCashAmount(total > 50000 ? 100000 : 50000)} className="py-4 border-2 border-gray-100 bg-gray-50 text-gray-700 rounded-2xl text-xs font-black hover:bg-gray-700 hover:text-white transition-all active:scale-95">{total > 50000 ? '100.000' : '50.000'}</button>
                          </div>
                          <div className="flex flex-col items-center mt-2 p-6 rounded-3xl bg-gray-900 text-white shadow-xl">
                            <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Kembalian</span>
                            <span className={`text-3xl font-black ${changeAmount < 0 ? 'text-red-400' : 'text-green-400'}`}>{cashAmount === '' ? '-' : formatRupiah(changeAmount)}</span>
                          </div>
                        </React.Fragment>
                      ) : (
                        <div className="flex flex-col items-center justify-center py-6 px-4 border-2 border-dashed border-blue-200 rounded-3xl bg-blue-50/50 h-full max-h-[300px] overflow-y-auto">
                          {storeInfo.qrisImage ? (
                            <img src={storeInfo.qrisImage} alt="QRIS" className="w-32 h-32 object-contain mb-3 rounded-lg shadow-sm border border-gray-200 bg-white p-1" />
                          ) : (
                            <QrCode size={48} className="text-blue-300 mb-4" />
                          )}
                          <p className="text-sm font-bold text-blue-800 text-center mb-1">Menunggu Pembayaran Online</p>
                          {storeInfo.bankInfo ? (
                            <div className="text-xs text-blue-700 text-center mt-2 whitespace-pre-line bg-white p-3 rounded-xl border border-blue-100 w-full">{storeInfo.bankInfo}</div>
                          ) : (
                            <p className="text-xs text-blue-500 text-center max-w-[200px]">Pastikan dana sudah masuk ke rekening/E-Wallet sebelum memproses.</p>
                          )}
                        </div>
                      )}
                    </div>
                    <div className="p-6 bg-gray-50 border-t border-gray-100">
                      <button onClick={processPayment} disabled={paymentMethod === 'Tunai' && (cashAmount === '' || changeAmount < 0)} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-lg hover:bg-blue-700 disabled:bg-gray-200 disabled:text-gray-400 transition-all active:scale-95 shadow-lg shadow-blue-100">Proses Transaksi</button>
                    </div>
                  </div>
                </div>
              )}

              {currentReceipt && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden flex flex-col max-h-[90vh] border border-white/20 animate-in zoom-in-95 duration-200">
                    <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                      <h3 className="font-black text-gray-800 flex items-center gap-3 text-xl">Struk Berhasil</h3>
                      <button onClick={() => setCurrentReceipt(null)} className="p-2 hover:bg-red-100 hover:text-red-600 rounded-full text-gray-400 transition-all"><X size={24} /></button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-8 bg-gray-100 flex justify-center shadow-inner">
                      <div className="bg-white w-full shadow-2xl p-6 font-mono text-[10px] text-gray-800 flex flex-col border border-gray-200 rounded-md relative overflow-hidden" style={{ maxWidth: '300px' }}>
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-b from-gray-100 to-transparent"></div>
                        {storeInfo.logo && <img src={storeInfo.logo} className="w-16 h-16 object-contain mx-auto mb-4" />}
                        <div className="text-center font-black text-sm mb-1 uppercase tracking-tighter">{storeInfo.name}</div>
                        <div className="text-center text-[8px] mb-4 pb-4 border-b border-dashed border-gray-300 leading-tight uppercase font-bold text-gray-400">{storeInfo.address}</div>
                        
                        <div className="mb-1 flex justify-between font-bold text-gray-500"><span>KASIR:</span><span className="text-gray-800">{currentReceipt.cashier || storeInfo.cashierName}</span></div>
                        <div className="mb-4 flex justify-between font-bold text-gray-500"><span>WAKTU:</span><span className="text-gray-800">{currentReceipt.date}</span></div>
                        
                        <div className="flex flex-col gap-2 mb-4 pb-4 border-b border-dashed border-gray-300">
                          {currentReceipt.items.map((item, idx) => (
                            <div key={idx}>
                              <div className="font-black text-gray-900 mb-0.5">{item.product.name}</div>
                              <div className="flex justify-between font-bold text-gray-500"><span>{item.quantity} x {formatRupiah(item.product.price)}</span><span className="text-gray-900">{formatRupiah(item.quantity * item.product.price)}</span></div>
                            </div>
                          ))}
                        </div>
                        
                        <div className="flex justify-between font-black text-sm mb-1"><span>GRAND TOTAL</span><span>{formatRupiah(currentReceipt.total)}</span></div>
                        <div className="flex justify-between font-bold text-gray-500 mb-1"><span>METODE</span><span className="uppercase">{currentReceipt.paymentMethod || 'TUNAI'}</span></div>
                        {currentReceipt.paymentMethod !== 'Online' && (
                          <React.Fragment>
                            <div className="flex justify-between font-bold text-gray-400 mb-1"><span>TUNAI</span><span>{formatRupiah(currentReceipt.cash || 0)}</span></div>
                            <div className="flex justify-between font-black text-gray-900 mb-6"><span>KEMBALIAN</span><span>{formatRupiah(currentReceipt.change || 0)}</span></div>
                          </React.Fragment>
                        )}
                        
                        <div className={`text-center font-black border-t border-dashed border-gray-300 pt-4 text-gray-400 tracking-widest uppercase ${currentReceipt.paymentMethod === 'Online' ? 'mt-4' : ''}`}>LUNAS</div>
                        <div className="text-center text-[8px] mt-1 font-bold text-gray-400">Terima Kasih Atas Kunjungan Anda</div>
                        <div className="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-t from-gray-100 to-transparent"></div>
                      </div>
                    </div>

                    <div className="p-6 bg-white border-t border-gray-100 flex flex-col gap-3">
                      <button onClick={() => printBluetooth(currentReceipt)} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 flex justify-center items-center gap-3 transition-all shadow-lg shadow-blue-100 active:scale-95"><Printer size={20} /> Cetak Struk (BT)</button>
                      <button onClick={printReceiptAsPDF} className="w-full py-4 bg-white text-gray-800 rounded-2xl font-black hover:bg-gray-50 flex justify-center items-center gap-3 border-2 border-gray-100 transition-all active:scale-95"><FileText size={20} /> Simpan PDF / Web</button>
                      <button onClick={() => setCurrentReceipt(null)} className="w-full py-3 bg-red-50 text-red-500 rounded-2xl font-black hover:bg-red-100 transition-all text-xs">Selesai</button>
                    </div>
                  </div>
                </div>
              )}

            </main>
          </div>

          {currentReceipt && (
            <div className="hidden print:block font-mono text-black bg-white w-full mx-auto text-[10px] leading-tight" style={{ maxWidth: '58mm' }}>
              {storeInfo.logo && <img src={storeInfo.logo} style={{ width: '30mm', display: 'block', margin: '0 auto 5mm auto' }} />}
              <div className="text-center font-bold text-sm mb-1">{storeInfo.name}</div>
              <div className="text-center text-[8px] mb-3 pb-3 border-b border-dashed border-black">{storeInfo.address}</div>
              <div className="text-[8px] mb-1">Kasir: {currentReceipt.cashier || storeInfo.cashierName}</div>
              <div className="text-[8px] mb-2">Tanggal: {currentReceipt.date}</div>
              <div className="flex flex-col gap-1.5 mb-3 pb-3 border-b border-dashed border-black">
                {currentReceipt.items.map((item, idx) => (
                  <div key={idx}><div className="font-bold">{item.product.name}</div><div className="flex justify-between"><span>{item.quantity}x {formatRupiah(item.product.price)}</span><span>{formatRupiah(item.quantity * item.product.price)}</span></div></div>
                ))}
              </div>
              <div className="flex justify-between font-bold text-sm mb-1"><span>TOTAL</span><span>{formatRupiah(currentReceipt.total)}</span></div>
              <div className="flex justify-between text-[8px] mb-1"><span>METODE</span><span className="uppercase font-bold">{currentReceipt.paymentMethod || 'TUNAI'}</span></div>
              {currentReceipt.paymentMethod !== 'Online' && (
                <React.Fragment>
                  <div className="flex justify-between text-[8px] mb-1"><span>TUNAI</span><span>{formatRupiah(currentReceipt.cash || 0)}</span></div>
                  <div className="flex justify-between text-[8px] font-bold mb-5"><span>KEMBALI</span><span>{formatRupiah(currentReceipt.change || 0)}</span></div>
                </React.Fragment>
              )}
              <div className={`text-center text-[8px] ${currentReceipt.paymentMethod === 'Online' ? 'mt-4' : ''}`}>Terima Kasih</div>
              <div className="text-center text-[8px]">Silakan datang kembali :)</div>
            </div>
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
